services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bankdoc
      POSTGRES_USER: bankdoc
      POSTGRES_PASSWORD: bankdoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: local-bankdoc-secret
      POSTGRES_DB: bankdoc
      POSTGRES_USER: bankdoc
      POSTGRES_PASSWORD: bankdoc
      POSTGRES_HOST: db
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
    volumes:
      - ./media:/media
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
